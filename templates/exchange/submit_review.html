{% extends 'base.html' %}

{% block title %}Review Session - SkillSwap{% endblock %}

{% block content %}
<div class="glass" style="max-width: 500px; margin: 4rem auto; padding: 2.5rem;">
    <h2 style="margin-bottom: 1rem; text-align: center;">How was your session?</h2>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">
        Your feedback helps build trust in the community.
    </p>

    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Rating</label>
            <select name="rating" required class="glass"
                style="width: 100%; padding: 0.75rem; color: white; border: 1px solid var(--glass-border); background: var(--glass-bg);">
                <option value="5">5 - Excellent</option>
                <option value="4">4 - Very Good</option>
                <option value="3">3 - Good</option>
                <option value="2">2 - Fair</option>
                <option value="1">1 - Poor</option>
            </select>
        </div>
        <div style="margin-bottom: 2rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Comment</label>
            <textarea name="comment" required class="glass" rows="4"
                style="width: 100%; padding: 0.75rem; color: white; border: 1px solid var(--glass-border); background: var(--glass-bg);"
                placeholder="What did you learn? How was the teaching style?"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Review</button>
    </form>
</div>
{% endblock %}
